<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Vectore Agency</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
        }

        .reset-card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .reset-card img {
            width: 60px;
            margin-bottom: 20px;
        }

        .reset-card h2 {
            font-size: 1.5rem;
            color: var(--dark, #160F50);
            margin-bottom: 15px;
        }

        .reset-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
        }

        .reset-card input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .reset-card input:focus {
            border-color: var(--primary, #8655FF);
        }

        .reset-card button {
            width: 100%;
            padding: 12px;
            background: var(--primary, #8655FF);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .reset-card button:hover {
            background: var(--primary-dark, #6b3fd9);
        }

        .message {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #28a745;
            display: none;
        }

        .message.error {
            color: #dc3545;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="reset-card">
            <a href="/"><img src="/Vectore-iso.svg" alt="Vectore Logo"></a>
            <h2>Nueva Contraseña</h2>
            <p>Ingresa y confirma tu nueva contraseña para acceder a tu cuenta.</p>
            <form id="resetForm">
                <input type="password" id="newPassword" placeholder="Nueva contraseña (min 6 caracteres)" required
                    minlength="6">
                <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required minlength="6">
                <button type="submit">Actualizar Contraseña</button>
            </form>
            <div id="resetMessage" class="message"></div>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgEl = document.getElementById('resetMessage');

            if (!token) {
                msgEl.textContent = 'Enlace inválido o sin token.';
                msgEl.className = 'message error';
                msgEl.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                msgEl.textContent = 'Las contraseñas no coinciden.';
                msgEl.className = 'message error';
                msgEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`/api/auth/resetpassword/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await res.json();

                if (data.success) {
                    msgEl.textContent = 'Contraseña actualizada. Redirigiendo...';
                    msgEl.className = 'message';
                    msgEl.style.display = 'block';

                    // Auto-login optionally or just redirect
                    localStorage.setItem('vectore_token', data.token);
                    localStorage.setItem('vectore_user', JSON.stringify(data.user));

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    msgEl.textContent = data.message || 'Error al restablecer la contraseña.';
                    msgEl.className = 'message error';
                    msgEl.style.display = 'block';
                }
            } catch (error) {
                msgEl.textContent = 'Error de conexión.';
                msgEl.className = 'message error';
                msgEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
